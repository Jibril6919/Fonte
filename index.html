<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>FONTE</title>
  <meta name="description" content="FONTE — journal d'entraînement">
  <meta name="theme-color" content="#0B0B0C">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FONTE">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { height: 100%; height: 100dvh; background: #0B0B0C; }
    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: #0B0B0C;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }
    #root { min-height: 100dvh; }
    /* éviter le rebond élastique dans le vide tout en gardant le scroll interne */
    html, body { position: relative; overscroll-behavior: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
