<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FONTE · test wger v2</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#09090B;--surface:#131316;--surface2:#1D1D22;--text:#FAFAF8;--sub:#9C9CA4;--faint:#5E5E66;--line:rgba(255,255,255,.06);--ac:#FF4F33;--ok:#3FBF7F;--warn:#E5A23D;--bad:#E5484D}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding:24px 16px 60px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-family:'Barlow Condensed',sans-serif;font-size:38px;line-height:1;color:var(--ac)}
  .sub{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.5}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
  button{background:var(--ac);color:#fff;border:0;border-radius:999px;padding:13px 20px;font:700 14px 'Manrope',sans-serif;width:100%;cursor:pointer}
  button:disabled{opacity:.45}
  .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:8px}
  pre{background:#000;border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;font:400 11px/1.5 ui-monospace,Menlo,monospace;color:#cfe;white-space:pre-wrap;word-break:break-word;max-height:340px;overflow:auto}
  .row{font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}
  .ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}
  img{width:60px;height:60px;object-fit:contain;background:#fff;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>TEST WGER · debug</h1>
  <p class="sub">Version diagnostic : elle montre les réponses brutes de wger pour comprendre pourquoi le taux était à 0. Rien n'est modifié dans l'app.</p>
  <div class="card">
    <button id="go">Lancer le diagnostic</button>
  </div>
  <div id="out"></div>
</div>

<script>
const WGER = "https://wger.de";
const out = document.getElementById("out");
const esc = (s) => String(s).replace(/</g,"&lt;");
function block(title, body){ const d=document.createElement("div"); d.className="card"; d.innerHTML=`<div class="lbl">${title}</div>${body}`; out.appendChild(d); return d; }
async function tryFetch(url){
  const t0=performance.now();
  try{
    const r=await fetch(url);
    const txt=await r.text();
    let j=null; try{j=JSON.parse(txt);}catch{}
    return {ok:r.ok,status:r.status,ms:Math.round(performance.now()-t0),txt,j};
  }catch(e){ return {err:String(e.message||e),ms:Math.round(performance.now()-t0)}; }
}

document.getElementById("go").onclick = async () => {
  document.getElementById("go").disabled = true;
  out.innerHTML = "";

  // TEST 1 : connexion de base — lister des exercices
  const b1 = block("1 · Connexion de base", "<p class='sub'>GET /api/v2/exerciseinfo/ …</p>");
  const r1 = await tryFetch(`${WGER}/api/v2/exerciseinfo/?format=json&limit=1`);
  b1.innerHTML += r1.err
    ? `<p class="bad">❌ Bloqué : ${esc(r1.err)}<br>→ Probablement CORS. wger inatteignable depuis le navigateur.</p>`
    : `<p class="${r1.ok?'ok':'bad'}">${r1.ok?'✅':'❌'} HTTP ${r1.status} · ${r1.ms} ms</p>`;
  if (r1.err){ document.getElementById("go").disabled=false; return; }

  // TEST 2 : recherche "bench press" (anglais, langue 2)
  const b2 = block("2 · Recherche « bench press » (EN, lang 2)", "");
  const r2 = await tryFetch(`${WGER}/api/v2/exercise/search/?term=bench%20press&language=2&format=json`);
  b2.innerHTML += r2.err ? `<p class="bad">❌ ${esc(r2.err)}</p>`
    : `<p class="${r2.ok?'ok':'bad'}">HTTP ${r2.status} · ${r2.ms} ms</p><pre>${esc((r2.txt||"").slice(0,1400))}</pre>`;

  // TEST 3 : recherche "développé couché" (français, langue 12 supposée)
  const b3 = block("3 · Recherche « développé couché » (FR, lang 12)", "");
  const r3 = await tryFetch(`${WGER}/api/v2/exercise/search/?term=${encodeURIComponent("développé couché")}&language=12&format=json`);
  b3.innerHTML += r3.err ? `<p class="bad">❌ ${esc(r3.err)}</p>`
    : `<p class="${r3.ok?'ok':'bad'}">HTTP ${r3.status} · ${r3.ms} ms</p><pre>${esc((r3.txt||"").slice(0,1400))}</pre>`;

  // TEST 4 : lister les langues (trouver l'id du français)
  const b4 = block("4 · Langues disponibles", "");
  const r4 = await tryFetch(`${WGER}/api/v2/language/?format=json&limit=100`);
  let frId = null;
  if (r4.j && r4.j.results){
    const fr = r4.j.results.find(l => (l.short_name||"").toLowerCase()==="fr");
    frId = fr ? fr.id : null;
    b4.innerHTML += `<p class="${frId?'ok':'warn'}">Français = id ${frId ?? "introuvable"}</p><pre>${esc(r4.j.results.map(l=>`${l.id}: ${l.short_name} (${l.full_name})`).join("\n"))}</pre>`;
  } else {
    b4.innerHTML += `<p class="bad">❌ ${esc(r4.err||("HTTP "+r4.status))}</p>`;
  }

  // TEST 5 : recherche image d'un exo connu via exerciseinfo + endpoint image
  const b5 = block("5 · Image du développé couché (barbell bench press)", "");
  // chercher l'exo en base par nom EN puis lire ses images
  const rs = await tryFetch(`${WGER}/api/v2/exercise/search/?term=barbell%20bench%20press&language=2&format=json`);
  let shown = false;
  if (rs.j && rs.j.suggestions){
    b5.innerHTML += `<p class="sub">${rs.j.suggestions.length} suggestion(s). Structure de la 1re :</p><pre>${esc(JSON.stringify(rs.j.suggestions[0]||{},null,1).slice(0,900))}</pre>`;
    // tenter de trouver une image dans les suggestions
    for (const s of rs.j.suggestions){
      const d=s.data||{}; const img=d.image||d.image_thumbnail;
      if (img){ const full=img.startsWith("http")?img:WGER+img; b5.innerHTML+=`<p class="ok">Image trouvée :</p><img src="${full}" alt=""><p class="sub">${esc(full)}</p>`; shown=true; break; }
    }
  }
  // fallback : endpoint dédié aux images
  const ri = await tryFetch(`${WGER}/api/v2/exerciseimage/?format=json&limit=3`);
  if (ri.j && ri.j.results && ri.j.results.length){
    const im = ri.j.results[0];
    b5.innerHTML += `<p class="sub">Exemple d'image de la base (endpoint /exerciseimage/) :</p><img src="${esc(im.image)}" alt=""><p class="sub">${esc(im.image||"")}</p>`;
    shown = true;
  }
  if (!shown) b5.innerHTML += `<p class="warn">Aucune image récupérée par ces méthodes.</p>`;

  document.getElementById("go").disabled = false;
  document.getElementById("go").textContent = "Relancer";
  block("Terminé", "<p class='sub'>Fais une capture de TOUTE la page (surtout les blocs 2, 3, 4, 5 avec leur texte) et envoie-la.</p>");
};
</script>
</body>
</html>
